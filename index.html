<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />

    <!-- Primary SEO -->
    <title>Action Media Network | #1 Local SEO Agency — Rank First on Google in 90 Days</title>
    <meta name="description" content="Action Media Network is a premier local SEO and digital media company. We guarantee your business ranks #1 on Google in 90 days. Exclusive, results-driven SEO services for small businesses." />
    <meta name="keywords" content="local SEO, SEO agency, rank #1 on Google, digital media company, small business SEO, Google ranking, local search optimization, SEO services, Action Media Network, AMN, search engine optimization, local business marketing, online visibility, website ranking, SEO experts, media network, digital marketing agency" />
    <meta name="author" content="Action Media Network" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://actionmedianetwork.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://actionmedianetwork.com/" />
    <meta property="og:title" content="Action Media Network | #1 Local SEO Agency" />
    <meta property="og:description" content="Guaranteed #1 Google ranking in 90 days. Exclusive local SEO services for small businesses. Double your leads and sales with Action Media Network." />
    <meta property="og:site_name" content="Action Media Network" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Action Media Network | #1 Local SEO Agency" />
    <meta name="twitter:description" content="Guaranteed #1 Google ranking in 90 days. Exclusive local SEO services for small businesses." />

    <!-- Additional SEO -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="7 days" />
    <meta name="theme-color" content="#0f1419" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Action Media Network",
      "alternateName": "AMN",
      "url": "https://actionmedianetwork.com",
      "description": "Premier local SEO and digital media company guaranteeing #1 Google rankings in 90 days.",
      "serviceType": ["Local SEO", "Search Engine Optimization", "Digital Marketing", "Website Ranking"],
      "areaServed": { "@type": "Country", "name": "United States" },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "SEO Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Local SEO - Rank #1 in 90 Days", "description": "Get your website ranked #1 on Google in as little as 90 days." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Exclusive Business Category SEO", "description": "Full exclusivity — one business category per city." } }
        ]
      },
      "slogan": "Work With a Business You Can Trust"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Action Media Network",
      "url": "https://actionmedianetwork.com",
      "description": "Local SEO and digital media company specializing in #1 Google rankings."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Action Media Network",
      "url": "https://actionmedianetwork.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
